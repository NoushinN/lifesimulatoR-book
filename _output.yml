bookdown::gitbook:
  css: style.css
  split_by: chapter
  includes:
    in_header: google-analytics.html
  config:
    toc:
      collapse: section
      scroll_highlight: true
      before: |
        <li><a href="./">lifesimulatoR Book</a></li>
    sharing:
      github: true
      facebook: false
      twitter: false

bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex